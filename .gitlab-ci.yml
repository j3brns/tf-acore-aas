# .gitlab-ci.yml — Platform CI/CD Pipeline
#
# Stages: validate → test → plan → deploy-dev → deploy-staging → deploy-prod
#
# Implements TASK-044.
# ADRs: ADR-007

stages:
  - validate
  - test
  - plan
  - deploy-dev
  - deploy-staging
  - deploy-prod

variables:
  AWS_REGION: "eu-west-2"
  UV_LINK_MODE: "copy"
  # Default roles (should be overridden in GitLab CI/CD variables)
  AWS_ROLE_ARN_VALIDATE: ${AWS_ROLE_ARN_VALIDATE}
  AWS_ROLE_ARN_DEPLOY_DEV: ${AWS_ROLE_ARN_DEPLOY_DEV}
  AWS_ROLE_ARN_DEPLOY_STAGING: ${AWS_ROLE_ARN_DEPLOY_STAGING}
  AWS_ROLE_ARN_DEPLOY_PROD: ${AWS_ROLE_ARN_DEPLOY_PROD}

default:
  image: python:3.12
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: sts.amazonaws.com

.aws_oidc_base:
  before_script:
    - |
      if command -v apt-get >/dev/null 2>&1 && [ "$(id -u)" -eq 0 ]; then
        apt-get update && apt-get install -y curl nodejs npm unzip jq
      else
        echo "Skipping apt bootstrap (non-privileged runner or apt-get unavailable); using existing/user-space tools."
      fi
    - curl -Ls https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - make ensure-tools
    - |
      export PATH="$HOME/.local/bin:$PATH"
      if ! command -v aws >/dev/null 2>&1; then
        echo "AWS CLI not found; installing user-scoped awscli with uv."
        uv tool install --force awscli
      fi
      if ! command -v aws >/dev/null 2>&1; then
        echo "ERROR: AWS CLI required for OIDC bootstrap is unavailable."
        echo "Install aws in the runner image or allow uv package downloads."
        exit 1
      fi
      aws --version
    - |
      KST=($(aws sts assume-role-with-web-identity \
        --role-arn ${AWS_ROLE_ARN} \
        --role-session-name "GitLabCI-${CI_JOB_ID}" \
        --web-identity-token ${GITLAB_OIDC_TOKEN} \
        --query "Credentials.[AccessKeyId,SecretAccessKey,SessionToken]" \
        --output text))
      if [ -z "${KST[0]}" ]; then echo "ERROR: STS AssumeRole failed"; exit 1; fi
      export AWS_ACCESS_KEY_ID=${KST[0]}
      export AWS_SECRET_ACCESS_KEY=${KST[1]}
      export AWS_SESSION_TOKEN=${KST[2]}
      export AWS_DEFAULT_REGION=${AWS_REGION}
      export AWS_REGION=${AWS_REGION}

# --- VALIDATE STAGE ---

validate:
  stage: validate
  extends: .aws_oidc_base
  variables:
    AWS_ROLE_ARN: ${AWS_ROLE_ARN_VALIDATE}
  script:
    - make validate-python
    - make validate-cdk
    - make validate-secrets-full
  interruptible: true

# --- TEST STAGE ---

test-unit:
  stage: test
  extends: .aws_oidc_base
  variables:
    AWS_ROLE_ARN: ${AWS_ROLE_ARN_VALIDATE}
  script:
    - make test-unit PYTEST_ARGS="--junitxml=junit-report.xml"
  artifacts:
    when: always
    reports:
      junit: junit-report.xml
  interruptible: true

# --- PLAN STAGE ---

plan-infra:
  stage: plan
  extends: .aws_oidc_base
  variables:
    AWS_ROLE_ARN: ${AWS_ROLE_ARN_VALIDATE}
  script:
    - make infra-diff ENV=dev > dev-diff.txt
    - make infra-diff ENV=staging > staging-diff.txt
    - make infra-diff ENV=prod > prod-diff.txt
  artifacts:
    paths:
      - dev-diff.txt
      - staging-diff.txt
      - prod-diff.txt
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# --- DEPLOY DEV ---

deploy-dev:
  stage: deploy-dev
  extends: .aws_oidc_base
  variables:
    AWS_ROLE_ARN: ${AWS_ROLE_ARN_DEPLOY_DEV}
    ENV: dev
  script:
    - make infra-deploy ENV=dev
    - make spa-deploy ENV=dev
  environment:
    name: dev
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# --- DEPLOY STAGING ---

deploy-staging:
  stage: deploy-staging
  extends: .aws_oidc_base
  variables:
    AWS_ROLE_ARN: ${AWS_ROLE_ARN_DEPLOY_STAGING}
    ENV: staging
  script:
    - make infra-deploy ENV=staging
    - make spa-deploy ENV=staging
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual

# --- DEPLOY PROD ---

deploy-prod:
  stage: deploy-prod
  extends: .aws_oidc_base
  variables:
    AWS_ROLE_ARN: ${AWS_ROLE_ARN_DEPLOY_PROD}
    ENV: prod
  script:
    - make infra-deploy-prod-ci
    - make spa-deploy ENV=prod
  environment:
    name: prod
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
